name: Deploy public folder to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build pretty-url static artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R public/. _site/
          shopt -s nullglob
          for page in _site/*.html; do
            name="$(basename "$page" .html)"
            if [[ "$name" == "index" ]]; then
              continue
            fi
            mkdir -p "_site/$name"
            cp "$page" "_site/$name/index.html"
          done

      - name: Upload public artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
